name: Build and deploy Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Test and build Scala.js app
        run: sbt test fullOptJS

      - name: Build dist folder
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          cp index.html dist/index.html
          cp -R public dist/public
          scala_js_output="$(find target -path '*/gym-tracker-pwa-opt/main.js' -type f | head -n 1)"
          test -n "$scala_js_output"
          cp "$scala_js_output" dist/main.js
          perl -0pi -e 's#<script src="\./target/[^"]+/main\.js"></script>#<script src="./main.js"></script>#' dist/index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
